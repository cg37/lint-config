name: Publish to npm

on:
    push:
        tags:
            - "v*"
    release:
        types: [published]

jobs:
    publish:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  cache: "npm"
                  registry-url: "https://registry.npmjs.org"

            - run: npm ci

            - name: Type check
              run: npx tsc --noEmit

            - name: Format check
              run: npm run format:check

            - name: Publish
              run: npm publish --provenance
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
