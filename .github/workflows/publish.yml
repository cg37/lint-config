name: Publish to npm

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:
        inputs:
            dry-run:
                description: "仅预检，不实际发布"
                type: boolean
                default: false
                required: false
permissions:
    id-token: write
    contents: read
jobs:
    publish:
        runs-on: ubuntu-latest
        concurrency:
            group: npm-publish
            cancel-in-progress: false
        permissions:
            contents: read
            id-token: write
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  cache: "npm"
                  registry-url: "https://registry.npmjs.org"

            - run: npm ci

            - name: Type check
              run: npx tsc --noEmit

            - name: Format check
              run: npm run format:check

            - name: Publish (dry-run)
              if: ${{ github.event.inputs.dry-run == 'true' }}
              run: npm publish --provenance --access public --dry-run

            - name: Publish
              if: ${{ github.event.inputs.dry-run != 'true' }}
              run: npm publish --provenance --access public
